<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Pull Quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    padding: 36px 40px;
    background: var(--grad-dawn);
    position: relative;
    min-height: 230px;
  }
  .quote-mark {
    font-family: var(--font-display); font-size: 96px; line-height: 0.6;
    color: var(--emerald); opacity: 0.7;
    position: absolute; top: 18px; left: 28px;
  }
  .quote {
    font-family: var(--font-display); font-style: italic;
    font-size: 32px; line-height: 1.18; letter-spacing: -0.02em;
    color: var(--ink); margin-left: 36px; max-width: 600px;
  }
  .by {
    margin-left: 36px; margin-top: 14px; display:flex; align-items:center; gap:10px;
  }
  .by .line { width: 28px; height: 1px; background: var(--ink-40); }
  .by span { font-family: var(--font-body); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-quiet); }
</style>
</head>
<body>
  <span class="quote-mark">"</span>
  <p class="quote">Memory is not a record. It's a feeling we replay until it becomes a story.</p>
  <div class="by"><div class="line"></div><span>SiyAI · field notes</span></div>
</body>
</html>
