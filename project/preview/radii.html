<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 26px 30px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items:flex-start; }
  .box { width: 100%; aspect-ratio: 1.1/1; background: linear-gradient(140deg, var(--seafoam) 0%, var(--sky) 100%); opacity:0.85; border: 1px solid var(--border);}
  .nm { font-family: var(--font-mono); font-size: 11px; color: var(--fg-quiet); }
  .px { font-family: var(--font-body); font-size: 12px; font-weight: 500;}
</style>
</head>
<body class="surface">
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:6px;"></div><span class="px">xs</span><span class="nm">6</span></div>
    <div class="cell"><div class="box" style="border-radius:8px;"></div><span class="px">sm</span><span class="nm">8</span></div>
    <div class="cell"><div class="box" style="border-radius:16px;"></div><span class="px">md</span><span class="nm">16</span></div>
    <div class="cell"><div class="box" style="border-radius:24px;"></div><span class="px">lg · card</span><span class="nm">24</span></div>
    <div class="cell"><div class="box" style="border-radius:32px;"></div><span class="px">xl · cinema</span><span class="nm">32</span></div>
    <div class="cell"><div class="box" style="border-radius:9999px;"></div><span class="px">pill · btn</span><span class="nm">∞</span></div>
  </div>
</body>
</html>
