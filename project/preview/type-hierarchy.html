<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Type Hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .stack { display: grid; grid-template-columns: 80px 1fr; gap: 14px 22px; align-items: baseline; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); }
  .h1 { font-family: var(--font-display); font-size: 44px; line-height: 1.02; letter-spacing: -0.025em; }
  .h2 { font-family: var(--font-display); font-size: 32px; line-height: 1.08; letter-spacing: -0.02em; }
  .h3 { font-family: var(--font-body);    font-size: 22px; line-height: 1.25; letter-spacing: -0.015em; font-weight: 500; }
  .h4 { font-family: var(--font-body);    font-size: 17px; line-height: 1.3;  font-weight: 600; }
  .body { font-family: var(--font-body);  font-size: 16px; color: var(--fg-muted); }
</style>
</head>
<body class="surface">
  <div class="stack">
    <span class="tag">H1 · serif</span><span class="h1">A film from your morning.</span>
    <span class="tag">H2 · serif</span><span class="h2">Begin a new story</span>
    <span class="tag">H3 · sans</span><span class="h3">Your library</span>
    <span class="tag">H4 · sans</span><span class="h4">Saved for later</span>
    <span class="tag">Body</span><span class="body">Three minutes, scored just for you.</span>
  </div>
</body>
</html>
