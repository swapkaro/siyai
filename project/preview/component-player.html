<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Floating Player</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    padding: 30px;
    background:
      radial-gradient(60% 60% at 30% 40%, rgba(166,227,255,0.55), transparent 60%),
      radial-gradient(60% 60% at 70% 60%, rgba(126,242,193,0.55), transparent 60%),
      linear-gradient(135deg, #E5D0AC 0%, #C6A179 100%);
    min-height: 240px;
  }
  .player {
    background: var(--bg-glass);
    backdrop-filter: var(--blur-cinema);
    -webkit-backdrop-filter: var(--blur-cinema);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: var(--r-xl);
    padding: 14px 16px;
    display:flex; align-items: center; gap: 14px;
    max-width: 640px;
    box-shadow: var(--shadow-float), inset 0 1px 0 rgba(255,255,255,0.55);
  }
  .pcover {
    width: 56px; height: 56px; border-radius: var(--r-md);
    background: linear-gradient(135deg, #F8E4C8 0%, #E2A78F 100%);
    flex-shrink: 0;
  }
  .pmeta { flex: 1; min-width: 0; display:flex; flex-direction:column; gap: 4px;}
  .ptitle { font-family: var(--font-display); font-size: 18px; line-height: 1.1; letter-spacing: -0.01em;}
  .psub { font-family: var(--font-mono); font-size: 11px; color: var(--fg-quiet);}
  .pbar { flex: 2; height: 4px; border-radius: 2px; background: rgba(13,15,23,0.1); position: relative; overflow: hidden;}
  .pbar::before { content:''; position:absolute; inset: 0; width: 38%; background: var(--ink); border-radius: 2px;}
  .pcontrol { width: 40px; height: 40px; border-radius: 50%; background: var(--ink); color: var(--ivory); display:flex; align-items:center; justify-content:center;}
  .pcontrol svg { width: 12px; height: 12px;}
</style>
</head>
<body>
  <div class="player">
    <div class="pcover"></div>
    <div class="pmeta">
      <span class="ptitle"><em>A song for my mother.</em></span>
      <span class="psub">SONG · 01:24 / 03:42</span>
    </div>
    <div class="pbar"></div>
    <div class="pcontrol">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
    </div>
  </div>
</body>
</html>
