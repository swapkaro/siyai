<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 30px; display: flex; flex-direction: column; gap: 18px;}
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); min-width: 84px;}
</style>
</head>
<body class="surface">
  <div class="row">
    <span class="lbl">format</span>
    <span class="badge badge-mint"><span class="dot dot-mint"></span> Film</span>
    <span class="badge badge-sky">Song</span>
    <span class="badge badge-gold">Letter</span>
    <span class="badge">Draft</span>
  </div>
  <div class="row">
    <span class="lbl">state</span>
    <span class="badge badge-emerald">Saved</span>
    <span class="badge"><span class="dot" style="background: var(--ink-40)"></span> Private</span>
    <span class="badge badge-gold"><span class="dot dot-gold"></span> Featured</span>
  </div>
  <div class="row">
    <span class="lbl">meta</span>
    <span class="badge" style="font-family: var(--font-mono);">02:14</span>
    <span class="badge" style="font-family: var(--font-mono);">v1.04</span>
    <span class="badge" style="font-family: var(--font-mono);">21:9</span>
  </div>
</body>
</html>
