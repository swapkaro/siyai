<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Inputs & Form Fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 30px; display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--fg-muted); font-weight: 500; }
  textarea.input { resize: none; height: 84px; font-family: var(--font-body);}
  .prompt {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    padding: 16px 18px;
    position: relative;
    box-shadow: var(--shadow-glow-soft);
  }
  .prompt textarea {
    width: 100%; border: 0; outline: 0; resize: none; height: 36px;
    font-family: var(--font-display); font-size: 22px; line-height: 1.3; color: var(--fg);
    background: transparent;
  }
  .prompt textarea::placeholder { color: var(--fg-faint); font-style: italic;}
  .prompt-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px;}
</style>
</head>
<body class="surface">
  <div class="field">
    <label>Standard input</label>
    <input class="input" placeholder="Title your story" value="Sunday morning, slow light" />
  </div>

  <div class="prompt">
    <textarea placeholder="Tell us about it…">A walk through the field with my grandmother. The mist hadn't lifted yet.</textarea>
    <div class="prompt-foot">
      <span class="t-small" style="color: var(--fg-faint);">SiyAI is listening</span>
      <button class="btn btn-primary btn-sm">Turn into a film</button>
    </div>
  </div>
</body>
</html>
