<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Story Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--cloud); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card-cinema { padding: 0; overflow: hidden; position: relative; }
  .poster {
    aspect-ratio: 16/10;
    position: relative;
    background:
      radial-gradient(60% 60% at 30% 30%, rgba(166,227,255,0.55), transparent 60%),
      radial-gradient(70% 60% at 70% 70%, rgba(126,242,193,0.55), transparent 60%),
      linear-gradient(135deg, #F5E9D7 0%, #E8D9BD 100%);
  }
  .poster.warm {
    background:
      radial-gradient(50% 50% at 70% 30%, rgba(246,213,138,0.55), transparent 60%),
      radial-gradient(70% 60% at 30% 80%, rgba(255,170,140,0.4), transparent 60%),
      linear-gradient(135deg, #F8E4C8 0%, #E2A78F 100%);
  }
  .poster-label {
    position:absolute; left:14px; bottom:14px;
    font-family: var(--font-display); font-style: italic; font-size: 18px; color: rgba(13,15,23,0.6);
  }
  .card-body { padding: 14px 18px 16px; display:flex; flex-direction:column; gap: 4px;}
  .title { font-family: var(--font-display); font-size: 22px; line-height: 1.15; letter-spacing:-0.015em;}
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-quiet);}
  .play {
    position:absolute; right:14px; bottom: 84px;
    width: 44px; height: 44px; border-radius: 50%; background: var(--bg-glass); backdrop-filter: var(--blur-glass);
    display:flex; align-items:center; justify-content:center;
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: var(--shadow-float);
  }
  .play svg { width: 14px; height: 14px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="card-cinema">
      <div class="poster">
        <span class="poster-label">hands at dusk</span>
      </div>
      <div class="play">
        <svg viewBox="0 0 24 24" fill="var(--ink)"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="card-body">
        <span class="title">Sunday morning, slow light.</span>
        <span class="meta">FILM · 02:14 · scored by SiyAI</span>
      </div>
    </div>

    <div class="card-cinema">
      <div class="poster warm">
        <span class="poster-label">a kitchen, summer</span>
      </div>
      <div class="play">
        <svg viewBox="0 0 24 24" fill="var(--ink)"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="card-body">
        <span class="title">A song for my mother.</span>
        <span class="meta">SONG · 03:42 · piano + warm strings</span>
      </div>
    </div>
  </div>
</body>
</html>
