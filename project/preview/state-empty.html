<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Empty State</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 26px 30px; background: var(--grad-dawn); min-height: 240px;}
  .empty {
    display:flex; flex-direction:column; align-items:center; gap: 14px;
    text-align: center; padding: 24px 0;
  }
  .ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1px dashed var(--ink-24);
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle, rgba(154,225,157,0.25), transparent 70%);
  }
  .ring svg { width: 22px; height: 22px; color: var(--emerald); }
  .title { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em;}
  .sub { font-size: 14px; color: var(--fg-muted); max-width: 340px;}
</style>
</head>
<body>
  <div class="empty">
    <div class="ring is-breathing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </div>
    <span class="title"><em style="font-style:italic">Your library is quiet.</em></span>
    <span class="sub">Tell us about a moment. A morning, a meeting, the smell of a house. And we'll bring it to life.</span>
    <button class="btn btn-primary btn-sm" style="margin-top: 4px;">Begin a story</button>
  </div>
</body>
</html>
