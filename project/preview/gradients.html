<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiyAI · Ambient Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;}
  .swatch { aspect-ratio: 16/10; border-radius: var(--r-lg); border: 1px solid var(--border); position: relative; overflow: hidden; display:flex; align-items:flex-end; padding: 10px 12px;}
  .nm { font-family: var(--font-mono); font-size: 11px; color: var(--ink-72); }
  .dawn { background: var(--grad-dawn); }
  .aurora { background: var(--ivory); position:relative;}
  .aurora::after { content:''; position:absolute; inset: -10%; background: var(--grad-aurora);}
  .gold {
    background: var(--ivory);
    position: relative;
  }
  .gold::after { content:''; position:absolute; inset: 0; background: var(--grad-gold-breath);}
  .nm-overlay { position: relative; z-index: 2; }
</style>
</head>
<body class="surface">
  <div class="swatch dawn"><span class="nm">dawn-wash</span></div>
  <div class="swatch aurora"><span class="nm nm-overlay">aurora-halo</span></div>
  <div class="swatch gold"><span class="nm nm-overlay">gold-breath</span></div>
</body>
</html>
